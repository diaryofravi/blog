title: Media Lounge
permalink: /media/

<style>
  /* ─────────────────────────────────────
     STICKY NAV BAR
  ───────────────────────────────────── */
  .media-nav {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(148,163,184,0.18);
    margin: 0 -1.5rem 3.5rem;
    padding: 0 1.5rem;
  }
  .dark .media-nav {
    background: rgba(15,23,42,0.88);
    border-bottom-color: rgba(148,163,184,0.1);
  }
  .media-nav-inner {
    display: flex;
    gap: 0;
    max-width: 72rem;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 1rem 1.4rem;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: #94a3b8;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    cursor: pointer;
    transition: color 0.18s, border-color 0.18s;
    white-space: nowrap;
  }
  .nav-btn:hover { color: #334155; }
  .dark .nav-btn:hover { color: #e2e8f0; }
  .nav-btn .nav-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    opacity: 0.55;
    transition: opacity 0.18s;
  }
  .nav-btn.active { border-bottom-color: var(--dot-color); color: var(--dot-color); }
  .nav-btn.active .nav-dot { opacity: 1; }

  /* ─────────────────────────────────────
     MEDIA SECTIONS
  ───────────────────────────────────── */
  .media-section {
    scroll-margin-top: 60px;
    padding-bottom: 5rem;
  }
  .media-section + .media-section {
    border-top: 1px solid rgba(148,163,184,0.12);
    padding-top: 4rem;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
  }
  .section-title-row {
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }
  .sect-emoji { font-size: 1.85rem; line-height: 1; }
  .view-all-link {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .view-all-link:hover { opacity: 0.6; }

  /* ─────────────────────────────────────
     HORIZONTAL SCROLL ROW
  ───────────────────────────────────── */
  .scroll-wrapper { position: relative; }
  .scroll-row {
    display: flex;
    gap: 1rem;
    overflow-x: auto;
    padding-bottom: 1rem;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: rgba(148,163,184,0.2) transparent;
  }
  .scroll-row::-webkit-scrollbar { height: 3px; }
