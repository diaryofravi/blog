<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>

  <!-- Inter font (lighter weights like your index) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --white: #ffffff;
      --bg: #faf8f2;
      --rule: #e8e0c8;
      --stone: #c8bb8a;
      --muted: #8a7d50;
      --body: #3d3520;
      --ink: #32291a;
      --earth: #c49800;
      --earth-l: #e0b000;
      --nav-h: 52px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 14px; /* reduced base font */
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--white);
      color: var(--body);
      font-weight: 300;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-h);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--rule);
    }

    .nav-in {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--ink);
      text-decoration: none;
    }

    nav a {
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      margin-left: 1.5rem;
      transition: color 0.2s;
    }

    nav a:hover {
      color: var(--earth);
    }

    /* MAIN CONTENT */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    main h1, main h2, main h3 {
      color: var(--ink);
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    main p {
      color: var(--muted);
      margin-bottom: 1rem;
      line-height: 1.8;
    }

    /* FOOTER */
    footer {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    footer p {
      font-size: 0.72rem;
      color: var(--stone);
    }

    footer a {
      font-size: 0.72rem;
      color: var(--stone);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--earth);
    }

    /* MOBILE */
    @media (max-width: 768px) {
      nav a {
        margin-left: 1rem;
      }

      main {
        padding: 2rem 1.2rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="nav-in">
      <a href="{{ '/' | relative_url }}" class="logo">Ravi</a>

      <nav>
        <a href="{{ '/stories/' | relative_url }}">Stories</a>
        <a href="{{ '/daily-living/' | relative_url }}">A Day in my Life</a>
        <a href="{{ '/gallery/' | relative_url }}">Gallery</a>
        <a href="{{ '/media/' | relative_url }}">Lounge</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>&copy; {{ "now" | date: "%Y" }} Ravi</p>
    <div>
      <a href="mailto:{{ site.email }}">Email</a>
    </div>
  </footer>

</body>
</html>
